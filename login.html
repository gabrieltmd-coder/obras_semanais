<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMS — Em Desenvolvimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #0d0900;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── BACKGROUND BLOBS ── */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            opacity: .40;
        }
        .blob-1 { width: 560px; height: 560px; background: #7a4c00; top: -160px; left: -140px; }
        .blob-2 { width: 440px; height: 440px; background: #5c3500; bottom: -120px; right: -100px; }
        .blob-3 { width: 280px; height: 280px; background: #3d2200; top: 38%; left: 52%; }

        /* ── WRAP ── */
        .wrap {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 2rem 1.5rem;
            animation: fadeUp .65s ease both;
        }

        /* ── SIGN IMAGE LINK ── */
        .sign-link {
            display: block;
            animation: float 4.5s ease-in-out infinite;
        }

        /* Canvas where JS renders the image with white BG removed */
        #signCanvas {
            width: 300px;
            height: 300px;
            border-radius: 12px;
            filter: drop-shadow(0 0 40px rgba(245,193,18,.40))
                    drop-shadow(0 8px 24px rgba(0,0,0,.70));
            display: block;
            transition: transform .25s ease, filter .25s ease;
        }
        .sign-link:hover #signCanvas {
            transform: scale(1.04);
            filter: drop-shadow(0 0 60px rgba(245,193,18,.60))
                    drop-shadow(0 12px 32px rgba(0,0,0,.70));
        }

        /* Fallback <img> shown when canvas can't process (CORS) */
        #signFallback {
            display: none;
            width: 300px;
            border-radius: 12px;
            filter: drop-shadow(0 0 40px rgba(245,193,18,.40))
                    drop-shadow(0 8px 24px rgba(0,0,0,.70));
            transition: transform .25s ease;
        }
        .sign-link:hover #signFallback {
            transform: scale(1.04);
        }

        /* ── TEXT BLOCK ── */
        .label { text-align: center; }

        .label-eyebrow {
            font-family: 'Montserrat', sans-serif;
            font-size: .63rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .26em;
            color: rgba(255,255,255,.28);
            margin-bottom: .65rem;
        }
        .label-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.65rem;
            font-weight: 900;
            color: #F5C112;
            text-transform: uppercase;
            letter-spacing: .12em;
            line-height: 1.1;
        }
        .label-desc {
            margin-top: .65rem;
            font-size: .78rem;
            color: rgba(255,255,255,.36);
            font-weight: 500;
            line-height: 1.65;
        }

        /* ── BACK BUTTON ── */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: .55rem;
            padding: .7rem 1.8rem;
            background: rgba(245,193,18,.09);
            border: 1px solid rgba(245,193,18,.30);
            border-radius: 50px;
            color: #F5C112;
            text-decoration: none;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            transition: background .22s, border-color .22s, transform .22s, box-shadow .22s;
        }
        .back-btn:hover {
            background: rgba(245,193,18,.18);
            border-color: rgba(245,193,18,.55);
            color: #F5C112;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(245,193,18,.18);
        }

        /* ── FOOTER ── */
        .capa-footer {
            position: fixed;
            bottom: 1.25rem;
            font-size: .62rem;
            color: rgba(255,255,255,.15);
            letter-spacing: .07em;
            text-transform: uppercase;
            z-index: 1;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50%       { transform: translateY(-14px) rotate(.8deg); }
        }

        @media (max-width: 600px) {
            body { overflow: auto; }
            #signCanvas, #signFallback { width: 220px; height: 220px; }
            .label-title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="wrap">

        <!-- ── SIGN ── -->
        <div class="sign-link">
            <!-- Canvas: JS remove branco e renderiza aqui -->
            <canvas id="signCanvas" width="600" height="600"></canvas>
            <!-- Fallback se CORS bloquear -->
            <img id="signFallback"
                 src="https://c8.alamy.com/comp/2G4EW3J/bright-caution-glossy-metal-plate-warning-sign-men-at-work-area-with-road-worker-icon-on-white-2G4EW3J.jpg"
                 alt="Men at Work">
        </div>

        <!-- Text -->
        <div class="label">
            <div class="label-eyebrow">TMS — Monitoramento de Obras</div>
            <div class="label-title">Em Desenvolvimento</div>
            <div class="label-desc">
                Esta funcionalidade está em construção.<br>
                Em breve estará disponível.
            </div>
        </div>

        <!-- Back -->
        <a href="{{ url_for('capa') }}" class="back-btn">
            <i class="bi bi-arrow-left"></i>
            Voltar ao Início
        </a>

    </div>

    <div class="capa-footer">TMS &mdash; Terminal Multimodal de Santos &copy; {{ now.year }}</div>

    <script>
    (function () {
        const IMG_SRC  = 'https://c8.alamy.com/comp/2G4EW3J/bright-caution-glossy-metal-plate-warning-sign-men-at-work-area-with-road-worker-icon-on-white-2G4EW3J.jpg';
        const canvas   = document.getElementById('signCanvas');
        const ctx      = canvas.getContext('2d');
        const fallback = document.getElementById('signFallback');

        const img = new Image();
        img.crossOrigin = 'anonymous';      // tenta com CORS

        img.onload = function () {
            const W = canvas.width, H = canvas.height;
            ctx.drawImage(img, 0, 0, W, H);

            try {
                const data = ctx.getImageData(0, 0, W, H);
                const d    = data.data;

                // Remove pixels próximos a branco (R>220 && G>220 && B>220)
                // e também suaviza a borda via alpha gradual
                for (let i = 0; i < d.length; i += 4) {
                    const r = d[i], g = d[i+1], b = d[i+2];
                    const brightness = (r + g + b) / 3;
                    if (brightness > 220) {
                        // totalmente branco/quase-branco → transparente
                        d[i+3] = 0;
                    } else if (brightness > 180) {
                        // zona de transição → alpha gradual para suavizar borda
                        d[i+3] = Math.round((220 - brightness) / 40 * 255);
                    }
                }

                ctx.putImageData(data, 0, 0);
            } catch (e) {
                // CORS bloqueou getImageData → usa fallback com imagem direta
                showFallback();
            }
        };

        img.onerror = function () { showFallback(); };

        function showFallback() {
            canvas.style.display   = 'none';
            fallback.style.display = 'block';
        }

        img.src = IMG_SRC;
    })();
    </script>

</body>
</html>
