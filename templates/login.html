{% extends "base.html" %}

{% block title %}Entrar{% endblock %}
{% block page_icon %}<i class="bi bi-person-circle"></i>{% endblock %}
{% block page_title %}Área do Cliente{% endblock %}
{% block breadcrumb %}Autenticação{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card-rumo mt-2">
            <div class="card-header">
                <i class="bi bi-box-arrow-in-right"></i>
                Entrar
            </div>
            <div style="padding:1.75rem 1.5rem;">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-envelope me-1" style="color:var(--tms-cyan);"></i>E-mail</label>
                        <input type="email" name="email" class="form-control" autofocus required
                               placeholder="seu@email.com" autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-key me-1" style="color:var(--tms-cyan);"></i>Senha</label>
                        <input type="password" name="senha" class="form-control" required
                               placeholder="••••••••••" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary-rumo w-100">
                        <i class="bi bi-unlock me-1"></i>Entrar
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('esqueci_senha') }}" style="font-size:.75rem; color:var(--tms-cyan); text-decoration:none;">
                        <i class="bi bi-question-circle me-1"></i>Esqueci minha senha
                    </a>
                </div>
                <div class="text-center mt-2">
                    <a href="{{ url_for('capa') }}" style="font-size:.75rem; color:var(--tms-muted); text-decoration:none;">
                        <i class="bi bi-arrow-left me-1"></i>Voltar ao início
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
