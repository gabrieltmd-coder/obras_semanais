<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMS — Monitoramento de Obras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #071422;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── BACKGROUND BLOBS ── */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
            opacity: .45;
        }
        .blob-1 { width:520px; height:520px; background:#003d80; top:-140px; left:-120px; }
        .blob-2 { width:420px; height:420px; background:#004d20; bottom:-100px; right:-80px; }
        .blob-3 { width:260px; height:260px; background:#00354a; top:40%; left:55%; }

        /* ── MAIN CONTENT ── */
        .capa-wrap {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 820px;
            padding: 2rem 1.5rem;
        }

        /* Logo */
        .logo-box {
            margin-bottom: 2rem;
            animation: fadeDown .6s ease both;
        }
        .logo-box img { height: 90px; display: block; filter: drop-shadow(0 4px 24px rgba(0,0,0,.5)); }

        /* Subtitle */
        .capa-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .22em;
            color: rgba(255,255,255,.4);
            margin-bottom: 3rem;
            animation: fadeDown .6s .1s ease both;
        }

        /* ── CARDS ── */
        .cards-row {
            display: flex;
            gap: 1.1rem;
            width: 100%;
            animation: fadeUp .65s .2s ease both;
        }

        .nav-card {
            flex: 1;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 20px;
            padding: 2rem 1.5rem 1.75rem;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .75rem;
            transition: transform .22s ease, background .22s ease, border-color .22s ease, box-shadow .22s ease;
            backdrop-filter: blur(10px);
            cursor: pointer;
            text-align: center;
        }
        .nav-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255,255,255,.22);
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
            color: #fff;
            text-decoration: none;
        }

        .nav-card.dash  { background: rgba(0,174,239,.09); border-color: rgba(0,174,239,.25); }
        .nav-card.dash:hover  { background: rgba(0,174,239,.16); border-color: rgba(0,174,239,.5); box-shadow: 0 20px 60px rgba(0,174,239,.18); }

        .nav-card.reg   { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.12); }
        .nav-card.reg:hover   { background: rgba(255,255,255,.10); }

        .nav-card.novo  { background: rgba(141,198,63,.09); border-color: rgba(141,198,63,.25); }
        .nav-card.novo:hover  { background: rgba(141,198,63,.16); border-color: rgba(141,198,63,.5); box-shadow: 0 20px 60px rgba(141,198,63,.15); }

        .card-icon {
            width: 62px; height: 62px;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.7rem;
            margin-bottom: .25rem;
        }
        .dash  .card-icon { background: rgba(0,174,239,.18); color: #00d4ff; }
        .reg   .card-icon { background: rgba(255,255,255,.10); color: rgba(255,255,255,.8); }
        .novo  .card-icon { background: rgba(141,198,63,.18); color: #8DC63F; }

        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
        }
        .dash  .card-title { color: #00d4ff; }
        .reg   .card-title { color: rgba(255,255,255,.85); }
        .novo  .card-title { color: #8DC63F; }

        .card-desc {
            font-size: .73rem;
            color: rgba(255,255,255,.42);
            line-height: 1.5;
            font-weight: 500;
        }

        .card-arrow {
            font-size: 1.1rem;
            margin-top: .25rem;
            opacity: .35;
            transition: opacity .2s, transform .2s;
        }
        .nav-card:hover .card-arrow { opacity: .9; transform: translateX(4px); }
        .dash:hover  .card-arrow { color: #00d4ff; }
        .novo:hover  .card-arrow { color: #8DC63F; }

        /* Footer */
        .capa-footer {
            position: fixed; bottom: 1.25rem;
            font-size: .62rem;
            color: rgba(255,255,255,.18);
            letter-spacing: .07em;
            text-transform: uppercase;
            z-index: 1;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .cards-row { flex-direction: column; }
            .logo-box  { padding: 1rem 1.75rem; }
            .logo-box img { height: 52px; }
            body { overflow: auto; }
        }
    </style>
</head>
<body>

    <!-- background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="capa-wrap">

        <!-- Logo -->
        <div class="logo-box">
            <img src="{{ url_for('static', filename='img/logo_branco.png') }}" alt="TMS — Terminal Multimodal de Santos">
        </div>

        <!-- Subtítulo -->
        <div class="capa-sub">Monitoramento de Obras Semanais</div>

        <!-- Cards -->
        <div class="cards-row">

            <a href="{{ url_for('dashboard') }}" class="nav-card dash">
                <div class="card-icon"><i class="bi bi-speedometer2"></i></div>
                <div class="card-title">Dashboard</div>
                <div class="card-desc">KPIs, curvas S financeira e física, histograma consolidado</div>
                <div class="card-arrow"><i class="bi bi-arrow-right"></i></div>
            </a>

            <a href="{{ url_for('index') }}" class="nav-card reg">
                <div class="card-icon"><i class="bi bi-grid-3x3-gap"></i></div>
                <div class="card-title">Registros</div>
                <div class="card-desc">Consulte, filtre e gerencie os registros semanais</div>
                <div class="card-arrow"><i class="bi bi-arrow-right"></i></div>
            </a>

            <a href="{{ url_for('novo') }}" class="nav-card novo">
                <div class="card-icon"><i class="bi bi-plus-circle"></i></div>
                <div class="card-title">Novo Registro</div>
                <div class="card-desc">Cadastre a evolução da semana para um contrato</div>
                <div class="card-arrow"><i class="bi bi-arrow-right"></i></div>
            </a>

        </div>
    </div>

    <div class="capa-footer">TMS &mdash; Terminal Multimodal de Santos &copy; {{ now.year }}</div>

    <script>
    // Teclado: 1=Dashboard, 2=Registros, 3=Novo
    document.addEventListener('keydown', e => {
        if (e.key === '1') window.location = "{{ url_for('dashboard') }}";
        if (e.key === '2') window.location = "{{ url_for('index') }}";
        if (e.key === '3') window.location = "{{ url_for('novo') }}";
    });
    </script>

</body>
</html>
