<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMS — Em Desenvolvimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:#0A2540; --paper:#eef1f5; --surface:#fff;
            --line:#cdd7e1; --line-2:#e3e9f0; --muted:#5B6B7B; --amber:#E8A33D; --cyan:#1B9FD8;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
            color: var(--ink);
            background-color: var(--paper);
            background-image:
                linear-gradient(rgba(10,37,64,.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10,37,64,.035) 1px, transparent 1px);
            background-size: 112px 112px, 112px 112px;
            display: flex; align-items: center; justify-content: center;
            padding: 2.5rem 1.25rem;
        }

        .sheet {
            width: 100%; max-width: 600px;
            background: var(--surface);
            border: 1.5px solid var(--ink);
            box-shadow: 0 18px 50px rgba(10,37,64,.14);
            animation: rise .5s cubic-bezier(.2,.7,.2,1) both;
        }
        @keyframes rise { from { opacity:0; transform: translateY(14px);} to { opacity:1; transform:none; } }

        /* selo */
        .tb {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.1rem 1.4rem; border-bottom: 1.5px solid var(--ink);
        }
        .tb .eyebrow {
            font-family: 'IBM Plex Mono', monospace; font-size: .6rem;
            letter-spacing: .24em; text-transform: uppercase; color: var(--muted);
        }
        .tb img { height: 30px; }
        .tb .rev {
            font-family: 'IBM Plex Mono', monospace; font-size: .62rem;
            letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
            text-align: right; line-height: 1.5;
        }
        .tb .rev b { color: var(--ink); }

        /* faixa de perigo — vernáculo de obra */
        .hazard {
            height: 18px;
            background: repeating-linear-gradient(45deg,
                var(--amber) 0 18px, var(--ink) 18px 36px);
            opacity: .92;
        }

        .body { padding: 2.4rem 1.6rem 2rem; text-align: center; }
        .cone {
            font-size: 2.6rem; color: var(--amber); line-height: 1; margin-bottom: 1.1rem;
        }
        .body h1 {
            font-family: 'Archivo', sans-serif; font-weight: 800;
            font-size: clamp(1.5rem, 5vw, 2.1rem); text-transform: uppercase;
            letter-spacing: -.005em; line-height: 1.05; margin-bottom: .8rem;
        }
        .body p {
            font-size: .9rem; color: var(--muted); max-width: 42ch; margin: 0 auto;
        }
        .tag {
            display: inline-block; margin-top: 1.3rem;
            font-family: 'IBM Plex Mono', monospace; font-size: .68rem;
            letter-spacing: .1em; text-transform: uppercase; color: var(--cyan);
            border: 1px solid var(--line); padding: .4rem .8rem;
        }

        .foot {
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; padding: .9rem 1.4rem; border-top: 1.5px solid var(--ink);
            background: var(--ink); flex-wrap: wrap;
        }
        .foot .stamp {
            font-family: 'IBM Plex Mono', monospace; font-size: .62rem;
            letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.5);
        }
        .back {
            font-family: 'IBM Plex Mono', monospace; font-size: .72rem;
            letter-spacing: .06em; text-transform: uppercase; color: var(--ink);
            background: #fff; border: 1.5px solid #fff; padding: .5rem 1.05rem;
            text-decoration: none; display: inline-flex; align-items: center; gap: .5rem;
            transition: background .16s ease, color .16s ease;
        }
        .back:hover { background: var(--cyan); border-color: var(--cyan); color: #fff; }

        @media (prefers-reduced-motion: reduce) { .sheet { animation: none; } }
    </style>
</head>
<body>

    <main class="sheet">
        <header class="tb">
            <div>
                <div class="eyebrow">Terminal Multimodal de Santos</div>
                <img src="{{ url_for('static', filename='img/logo_tms.png') }}" alt="TMS" style="margin-top:.45rem;">
            </div>
            <div class="rev">
                Documento<br><b>RDO's</b><br>Status <b>WIP</b>
            </div>
        </header>

        <div class="hazard"></div>

        <div class="body">
            <div class="cone"><i class="bi bi-cone-striped"></i></div>
            <h1>Módulo em<br>desenvolvimento</h1>
            <p>Os relatórios diários de obra (RDO's) estão em construção. Em breve este painel entra em operação.</p>
            <span class="tag">Previsto para próxima fase</span>
        </div>

        <footer class="foot">
            <span class="stamp">TMS · {{ now.year if now else 2026 }}</span>
            <a href="{{ url_for('capa') }}" class="back"><i class="bi bi-arrow-left"></i> Voltar ao início</a>
        </footer>
    </main>

</body>
</html>
